services:
  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    # Override the base container_name so multiple instances don't clash.
    # Falls back to a port-suffixed name so setting only GRAFANA_PORT is enough.
    container_name: ${GRAFANA_CONTAINER_NAME:-grafana-echarts-panel-${GRAFANA_PORT:-3001}}
    ports: !override
      - ${GRAFANA_PORT:-3001}:3000/tcp
