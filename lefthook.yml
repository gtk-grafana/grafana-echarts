# Pre-commit gate: block commits that break TypeScript types, lint, or formatting.
# https://lefthook.dev/configuration/
pre-commit:
  parallel: true
  commands:
    # Project-wide type check; broken types cannot be committed.
    typecheck:
      run: pnpm run typecheck
    # Lint the whole project (cached); enforces the no-any / no-unsafe rules.
    lint:
      run: pnpm run lint
    # Check Prettier formatting; run `pnpm run lint:fix` to auto-fix.
    prettier:
      run: pnpm run prettier:check
    test:
      run: pnpm run test:ci
